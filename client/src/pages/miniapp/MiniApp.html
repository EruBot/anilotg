
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Test InitData</title>
  <style>
    body{background:#020617;color:#e2e8f0;font-family:monospace;padding:20px}
    pre{background:#0f172a;padding:16px;border-radius:12px;overflow:auto}
    .ok{color:#22c55e} .bad{color:#ef4444}
  </style>
</head>
<body>
  <h2>TEST TELEGRAM WEBAPP</h2>
  <div id="status">Loading...</div>
  <pre id="out"></pre>

<script>
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); }

const data = {
  hasTelegram: !!tg,
  initDataAda: !!tg?.initData,
  initDataLength: tg?.initData?.length || 0,
  user: tg?.initDataUnsafe?.user || null,
  platform: tg?.platform,
  version: tg?.version
};

document.getElementById('status').innerHTML = data.hasTelegram 
  ? '<span class="ok">✓ Telegram WebApp terdeteksi</span>' 
  : '<span class="bad">✗ TIDAK terdeteksi - dibuka di browser biasa</span>';

document.getElementById('out').textContent = JSON.stringify(data, null, 2);
</script>
</body>
</html>
