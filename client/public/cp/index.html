<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>
<script>window.Intl=window.Intl||{};Intl.t=function(s){return(Intl._locale&&Intl._locale[s])||s;};</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CP Tap — Anime Lovers Indo</title>
<meta name="theme-color" content="#020617">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{color-scheme:dark}
  *{-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Outfit',system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial; background:#020617; color:#e2e8f0; overscroll-behavior:none}
  .tick{position:absolute;left:50%;top:18%;transform:translateX(-50%);font-weight:800;font-size:26px;color:#22d3ee;text-shadow:0 4px 24px rgba(34,211,238,.7);pointer-events:none;animation:float .72s cubic-bezier(.2,.7,.25,1) forwards;z-index:20}
  @keyframes float{0%{opacity:1;transform:translate(-50%,0) scale(.9)}100%{opacity:0;transform:translate(-50%,-92px) scale(1.15)}}
  .tap-btn{transition:transform .08s cubic-bezier(.2,.8,.2,1)}
  .tap-btn:active{transform:scale(.93)}
  .navbtn.active .nav-icon{background:#2563eb;border-color:transparent;color:white;box-shadow:0 12px 28px -8px rgba(37,99,235,.55)}
  .navbtn.active .nav-label{color:#7dd3fc}
  .tab.active{background:#2563eb;border-color:transparent;color:#fff;box-shadow:0 8px 20px -6px rgba(37,99,235,.5)}
  #content{transition:opacity .18s ease}
  ::-webkit-scrollbar{display:none}
</style>
</head>
<body class="antialiased selection:bg-cyan-500/30 selection:text-white">
  <!-- Background -->
  <div aria-hidden class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-40 -right-32 h-80 w-80 rounded-full bg-[#2563eb]/30 blur-[120px]"></div>
    <div class="absolute top-1/3 -left-40 h-80 w-80 rounded-full bg-[#0ea5e9]/20 blur-[120px]"></div>
    <div class="absolute bottom-0 left-1/2 h-64 w-64 -translate-x-1/2 rounded-full bg-indigo-600/20 blur-[100px]"></div>
  </div>

  <div id="debug" class="fixed right-3 top-3 z-[100] rounded-lg border border-amber-500/20 bg-amber-500/10 px-2.5 py-1 font-mono text-[10px] leading-none text-amber-200/90 backdrop-blur-xl">init</div>

  <main class="mx-auto flex min-h-screen w-full max-w-[480px] flex-col px-5 pb-28 pt-7">
    <header class="mb-5 flex items-start justify-between">
      <div>
        <h2 id="title" class="text-[30px] font-extrabold leading-[1.05] tracking-tight">Tap Game</h2>
        <div id="subtitle" class="mt-1.5 text-[13px] text-slate-400">1 tap = 1 CP • 6 tap/detik</div>
      </div>
      <div class="mt-1 flex items-center gap-1.5 rounded-full border border-white/10 bg-white/5 px-2.5 py-1.5 text-[11px] font-medium text-slate-200 backdrop-blur-xl">
        <span class="relative flex h-2 w-2"><span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex h-2 w-2 rounded-full bg-emerald-400"></span></span>
        ALI
      </div>
    </header>

    <div id="board-controls" class="mb-4 grid grid-cols-2 gap-2" style="display:none">
      <button class="tab active group relative flex items-center justify-center gap-1.5 rounded-2xl border border-white/10 bg-white/5 px-3 py-2.5 text-[13px] font-semibold backdrop-blur-xl transition active:scale-[0.98]" data-p="mingguan">
        <span>Mingguan</span>
      </button>
      <button class="tab group relative flex items-center justify-center gap-1.5 rounded-2xl border border-white/10 bg-white/5 px-3 py-2.5 text-[13px] font-semibold backdrop-blur-xl transition active:scale-[0.98]" data-p="harian">
        <span>Harian</span>
      </button>
    </div>

    <section id="content" class="relative flex-1"></section>
  </main>

  <!-- Nav -->
  <nav class="fixed inset-x-0 bottom-0 z-50">
    <div class="pointer-events-none absolute inset-x-0 bottom-0 h-36 bg-gradient-to-t from-[#020617] via-[#020617]/80 to-transparent"></div>
    <div class="relative mx-auto flex w-full max-w-[480px] items-end justify-between px-8 pb-[calc(env(safe-area-inset-bottom)+18px)]">
      <button id="btn-board" class="navbtn group flex w-[84px] flex-col items-center gap-1.5">
        <div class="nav-icon flex h-[46px] w-[72px] items-center justify-center rounded-2xl border border-white/10 bg-white/5 text-[20px] backdrop-blur-xl transition">📊</div>
        <span class="nav-label text-[11px] font-medium uppercase tracking-wider text-slate-500 transition">Board</span>
      </button>

      <button id="btn-game" class="tap-main group relative -top-6" aria-label="Game">
        <div class="absolute inset-0 rounded-full bg-sky-500/30 blur-2xl transition group-active:scale-90"></div>
        <div class="relative flex h-[74px] w-[74px] items-center justify-center rounded-full border-[3px] border-[#020617] bg-gradient-to-b from-[#2563eb] to-[#0ea5e9] shadow-[0_16px_40px_-10px_rgba(14,165,233,.8),inset_0_1px_0_rgba(255,255,255,.2)] transition group-active:scale-95">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="h-[28px] w-[28px] drop-shadow-[0_2px_8px_rgba(0,0,0,.5)]"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        </div>
      </button>

      <button id="btn-profile" class="navbtn group flex w-[84px] flex-col items-center gap-1.5">
        <div class="nav-icon flex h-[46px] w-[72px] items-center justify-center rounded-2xl border border-white/10 bg-white/5 text-[20px] backdrop-blur-xl transition">👤</div>
        <span class="nav-label text-[11px] font-medium uppercase tracking-wider text-slate-500 transition">Profil</span>
      </button>
    </div>
  </nav>

<script>
const API="https://anilocp.vercel.app/api/miniapp";
const CHAT_ID="-1001236366475";
const COOLDOWN_MS = 167;
const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
try{tg.setHeaderColor('#020617');tg.setBackgroundColor('#020617');}catch{}

const debug=document.getElementById('debug');
const content=document.getElementById('content');
const title=document.getElementById('title');
const subtitle=document.getElementById('subtitle');
const boardControls=document.getElementById('board-controls');

let lastTap=0, myProfile=null, period='mingguan', view='game';

function dbg(){ const u=tg.initDataUnsafe?.user; debug.textContent=`id:${u?.id||'-'} • ${navigator.onLine?'on':'off'}` }
setInterval(dbg,1200); dbg();

function skeletonList(n=8){return `<div class="space-y-2.5">${Array(n).fill(0).map(()=>`<div class="h-[72px] animate-pulse rounded-2xl border border-white/5 bg-white/[0.03]"></div>`).join('')}</div>`}

async function loadBoard(){
  view='board'; title.textContent='Leaderboard'; subtitle.textContent='Top CP Anime Lovers Indo'; boardControls.style.display='grid';
  document.getElementById('btn-board').classList.add('active'); document.getElementById('btn-profile').classList.remove('active');
  content.style.opacity=.6; content.innerHTML=skeletonList();
  try{
    const r=await fetch(`${API}/leaderboard?chat_id=${CHAT_ID}&type=cp&period=${period}`); const d=await r.json();
    const rows=d.rows||[];
    content.innerHTML=rows.map(x=>{
      const rank = x.rank;
      const medal = rank==1?'🥇':rank==2?'🥈':rank==3?'🥉':'';
      const rankCls = rank==1?'bg-amber-500/20 text-amber-200 ring-amber-400/20':rank==2?'bg-slate-400/15 text-slate-100 ring-slate-300/15':rank==3?'bg-orange-500/15 text-orange-200 ring-orange-400/15':'bg-white/5 text-slate-300 ring-white/10';
      return `<div class="group relative mb-2.5 overflow-hidden rounded-[20px] border border-white/10 bg-slate-900/60 p-3.5 backdrop-blur-2xl transition hover:bg-slate-900/80">
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-xl ring-1 ${rankCls} text-[13px] font-bold">${medal||('#'+rank)}</div>
          <img src="https://api.dicebear.com/9.x/thumbs/svg?seed=${encodeURIComponent(x.username||x.display_name||'user')}" class="h-11 w-11 rounded-xl border border-white/10 bg-slate-800 object-cover" alt="">
          <div class="min-w-0 flex-1">
            <div class="truncate font-semibold leading-tight">${x.display_name||'Tanpa Nama'}</div>
            ${x.username?`<div class="text-[12px] text-slate-500">@${x.username}</div>`:''}
          </div>
          <div class="text-right">
            <div class="font-extrabold tabular-nums leading-none tracking-tight text-[20px] text-sky-300">${Number(x.value).toLocaleString('id-ID')}</div>
            <div class="mt-0.5 text-[10px] uppercase tracking-widest text-slate-500">CP</div>
          </div>
        </div>
      </div>`
    }).join('') || `<div class="rounded-2xl border border-white/10 bg-white/5 p-8 text-center text-slate-400 backdrop-blur">Belum ada data</div>`;
  }catch(e){
    content.innerHTML=`<div class="rounded-2xl border border-red-500/20 bg-red-500/10 p-6 text-center text-red-200">Gagal memuat leaderboard</div>`;
  }
  content.style.opacity=1;
}

async function loadProfile(){
  view='profile'; title.textContent='Profil'; subtitle.textContent='Statistik kamu'; boardControls.style.display='none';
  document.getElementById('btn-profile').classList.add('active'); document.getElementById('btn-board').classList.remove('active');
  content.style.opacity=.6; content.innerHTML=skeletonList(4);
  try{
    const r=await fetch(`${API}/profile?chat_id=${CHAT_ID}`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const d=await r.json(); const u=d.user; myProfile=u;
    content.innerHTML=`
    <div class="relative overflow-hidden rounded-[28px] border border-white/10 bg-gradient-to-b from-slate-900/80 to-slate-900/40 p-[1px]">
      <div class="relative rounded-[27px] bg-slate-950/70 p-6">
        <div class="pointer-events-none absolute -right-20 -top-20 h-48 w-48 rounded-full bg-sky-500/20 blur-3xl"></div>
        <div class="flex items-center gap-4">
          <div class="relative">
            <img src="https://api.dicebear.com/9.x/thumbs/svg?seed=${encodeURIComponent(u.username||u.first_name||'u')}" class="h-[78px] w-[78px] rounded-2xl border-2 border-sky-400/60 bg-slate-900 object-cover shadow-xl shadow-sky-900/20" alt="">
            <div class="absolute -bottom-2 -right-2 flex h-7 min-w-[28px] items-center justify-center rounded-full border-2 border-slate-950 bg-sky-500 px-1.5 text-[12px] font-bold text-white shadow-lg">#${u.current_rank}</div>
          </div>
          <div class="min-w-0 flex-1">
            <div class="truncate text-[24px] font-extrabold leading-tight">${u.first_name||'User'}</div>
            <div class="text-[13px] text-slate-400">@${u.username||u.user_id}</div>
            <div class="mt-2 inline-flex items-center gap-1 rounded-full border border-emerald-500/20 bg-emerald-500/10 px-2.5 py-1 text-[11px] font-medium text-emerald-300">Terhubung</div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-4 grid grid-cols-2 gap-3">
      ${[['🏆','Rank',u.current_rank],['⚡','CP Minggu',Number(u.cp_mingguan).toLocaleString('id-ID')],['💬','Chat Minggu',Number(u.chat_mingguan).toLocaleString('id-ID')],['📈','Total Chat',Number(u.total_chat).toLocaleString('id-ID')]].map(([i,l,v])=>`
      <div class="group relative overflow-hidden rounded-2xl border border-white/10 bg-white/[0.04] p-4 backdrop-blur-xl">
        <div class="absolute inset-0 opacity-0 transition group-hover:opacity-100" style="background:radial-gradient(200px circle at 20% 0%, rgba(56,189,248,.15), transparent 40%)"></div>
        <div class="relative text-[11px] uppercase tracking-wider text-slate-500">${i} ${l}</div>
        <div class="relative mt-1.5 text-[24px] font-extrabold tracking-tight">${v}</div>
      </div>`).join('')}
    </div>

    <div class="relative mt-4 overflow-hidden rounded-[24px] border border-sky-500/20 bg-[radial-gradient(ellipse_at_top,_rgba(14,165,233,.18),_transparent_60%)] p-[1px]">
      <div class="rounded-[23px] bg-slate-950/80 px-6 py-6 text-center backdrop-blur-xl">
        <div class="text-[11px] uppercase tracking-[0.2em] text-sky-300/80">Total CP</div>
        <div class="mt-1.5 bg-gradient-to-b from-white to-sky-200 bg-clip-text font-black tracking-tighter text-transparent" style="font-size:42px;line-height:1">${Number(u.total_cp).toLocaleString('id-ID')}</div>
        <div class="mx-auto mt-3 inline-flex items-center gap-1.5 rounded-full border border-white/10 bg-white/5 px-3 py-1 text-[11px] text-slate-300">Tap untuk menambah</div>
      </div>
    </div>`;
  }catch(e){
    content.innerHTML=`<div class="rounded-2xl border border-red-500/20 bg-red-500/10 p-6 text-center text-red-200">Gagal memuat profil</div>`;
  }
  content.style.opacity=1;
}

async function loadGame(){
  view='game'; title.textContent='Tap Game'; subtitle.textContent='1 tap = 1 CP • 6 tap/detik'; boardControls.style.display='none';
  document.getElementById('btn-board').classList.remove('active'); document.getElementById('btn-profile').classList.remove('active');
  content.style.opacity=.6;
  if(!myProfile){ try{ const r=await fetch(`${API}/profile?chat_id=${CHAT_ID}`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const d=await r.json(); myProfile=d.user; }catch{} }
  const cp = myProfile?.total_cp||0;
  content.innerHTML=`
  <div class="flex min-h-[60vh] flex-col items-center justify-center">
    <div class="relative mb-10 text-center">
      <div class="pointer-events-none absolute -inset-12 -z-10 rounded-full bg-sky-500/15 blur-3xl"></div>
      <p class="text-[11px] uppercase tracking-[0.22em] text-slate-500">Total CP</p>
      <div id="cp" class="mt-1 bg-gradient-to-b from-white to-sky-200 bg-clip-text text-7xl font-black tracking-tighter text-transparent">${Number(cp).toLocaleString('id-ID')}</div>
      <div class="mt-3 flex items-center justify-center gap-2">
        <span class="inline-flex items-center gap-1 rounded-full border border-emerald-500/20 bg-emerald-500/10 px-2.5 py-1 text-[11px] font-semibold text-emerald-300">+1 per tap</span>
        <span class="inline-flex items-center gap-1 rounded-full border border-white/10 bg-white/5 px-2.5 py-1 text-[11px] text-slate-400">Max 6/s</span>
      </div>
    </div>

    <div class="tap-area relative">
      <div class="pointer-events-none absolute -inset-10 animate-pulse rounded-full bg-sky-500/10 blur-3xl"></div>
      <button id="tap" class="tap-btn group relative flex h-[220px] w-[220px] select-none items-center justify-center rounded-full border-[7px] border-sky-400/80 bg-[radial-gradient(circle_at_35%_30%,#1e3a8a_0%,#0b1220_60%,#020617_100%)] shadow-[inset_0_0_50px_rgba(0,0,0,.7),0_25px_70px_-20px_rgba(14,165,233,.6)] outline-none touch-manipulation">
        <div class="pointer-events-none absolute inset-0 rounded-full bg-gradient-to-b from-white/15 to-transparent opacity-70 mix-blend-overlay"></div>
        <div class="pointer-events-none absolute inset-[14px] rounded-full border border-white/10"></div>
        <svg class="relative h-[92px] w-[92px] drop-shadow-[0_6px_18px_rgba(0,0,0,.55)] transition-transform group-active:scale-90" viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="url(#g)"/></svg>
        <svg width="0" height="0"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#0ea5e9" stop-opacity=".25"/></linearGradient></defs></svg>
      </button>
    </div>
    <div id="status" class="mt-6 h-5 text-center text-[12px] text-slate-500"></div>
  </div>`;
  content.style.opacity=1;
  const btn=document.getElementById('tap');
  btn.addEventListener('pointerdown', doTap, {passive:true});
}
function spawnTick(el){
  const t=document.createElement('div'); t.className='tick'; t.textContent='+1'; el.appendChild(t); setTimeout(()=>t.remove(),720);
}
async function doTap(e){
  const now=performance.now();
  if(now-lastTap<COOLDOWN_MS){ const s=document.getElementById('status'); if(s){s.textContent='Terlalu cepat!'; setTimeout(()=>s.textContent='',500)} return }
  lastTap=now;
  const btn=document.getElementById('tap'); const area=btn.parentElement; spawnTick(area);
  tg.HapticFeedback?.impactOccurred('light');
  if(myProfile){ myProfile.total_cp=(myProfile.total_cp||0)+1; const cpEl=document.getElementById('cp'); if(cpEl) cpEl.textContent=Number(myProfile.total_cp).toLocaleString('id-ID') }
  try{
    const r=await fetch(`${API}/tap`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}});
    const d=await r.json();
    if(d.ok){ if(myProfile) myProfile.total_cp=d.total_cp; const cpEl=document.getElementById('cp'); if(cpEl) cpEl.textContent=Number(d.total_cp).toLocaleString('id-ID'); }
  }catch{}
}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');period=b.dataset.p;loadBoard()});
document.getElementById('btn-board').onclick=loadBoard;
document.getElementById('btn-profile').onclick=loadProfile;
document.getElementById('btn-game').onclick=loadGame;

loadGame();
</script>
</body>
</html>
