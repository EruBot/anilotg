<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="https://telegram.org/js/telegram-web-app.js"></script><title>CP Game</title>
<style>:root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;background:#020617;color:#e2e8f0;font-family:system-ui;padding:16px 14px 100px}
h2{margin:0 0 4px;font-weight:800}.sub{font-size:12px;opacity:.6;margin-bottom:12px}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:12px;margin-bottom:8px}
.nav{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:end;justify-content:space-around;padding:10px 10px 18px;background:#020617ee;border-top:1px solid #1e293b}
.navbtn{flex:1;padding:12px;border-radius:10px;border:1px solid #1e293b;background:#0f172a;color:#fff;font-weight:700}
.navbtn.active{background:#2563eb}
.tap-main{position:relative;top:-20px;width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#0ea5e9);border:4px solid #020617;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 6px 20px #0ea5e955}
.game-wrap{text-align:center;padding-top:20px}.tap-btn{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#1e40af,#0f172a);border:6px solid #0ea5e9;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:900;user-select:none;touch-action:manipulation}
.tap-btn:active{transform:scale(.95)}.counter{font-size:42px;font-weight:900;color:#7dd3fc}.debug{background:#f59e0b22;border:1px solid #f59e0b;padding:6px;border-radius:8px;font-size:11px;margin-bottom:10px;font-family:monospace}
</style></head><body>
<div id="debug" class="debug">init...</div>
<h2 id="title">Leaderboard</h2><div id="subtitle" class="sub">Anime Lovers Indo</div>
<div id="content"></div>
<div class="nav">
  <button id="btn-board" class="navbtn active">📊</button>
  <button id="btn-game" class="tap-main">⚡</button>
  <button id="btn-profile" class="navbtn">👤</button>
</div>
<script>
const API="https://anilocp.vercel.app/api/miniapp"; const CHAT_ID="-1001236366475";
const tg=Telegram.WebApp; tg.ready(); tg.expand();
const debug=document.getElementById('debug'); const content=document.getElementById('content');
let lastTap=0; let myCp=0;

function setD(){debug.textContent=`id:${tg.initDataUnsafe?.user?.id} len:${tg.initData?.length||0}`;} setInterval(setD,500);

async function loadBoard(){document.getElementById('title').textContent='Leaderboard'; const r=await fetch(`${API}/leaderboard?chat_id=${CHAT_ID}&type=cp&period=mingguan`); const d=await r.json(); content.innerHTML=(d.rows||[]).map(x=>`<div class="card" style="display:flex;gap:10px"><div style="width:28px;color:#64748b">#${x.rank}</div><div style="flex:1"><b>${x.display_name}</b>${x.username?`<div style="font-size:11px;opacity:.6">@${x.username}</div>`:''}</div><b style="color:#7dd3fc">${Number(x.value).toLocaleString('id-ID')}</b></div>`).join('');}
async function loadProfile(){document.getElementById('title').textContent='Profile'; const r=await fetch(`${API}/profile?chat_id=${CHAT_ID}`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const d=await r.json(); const u=d.user; myCp=u.total_cp; content.innerHTML=`<div class="card" style="text-align:center"><h3>${u.first_name}</h3><div>@${u.username||''}</div><div style="margin-top:12px">Total CP: <b>${u.total_cp.toLocaleString('id-ID')}</b></div></div>`;}
function loadGame(){document.getElementById('title').textContent='Tap Game'; content.innerHTML=`<div class="game-wrap"><div class="counter" id="cp">${myCp.toLocaleString('id-ID')}</div><div style="opacity:.7;margin-bottom:10px">1 tap = 1 CP • cooldown 1s</div><div class="tap-btn" id="tap">TAP</div><div id="status" style="height:20px;opacity:.7"></div></div>`; document.getElementById('tap').onclick=doTap;}
async function doTap(){ const now=Date.now(); if(now-lastTap<1000){document.getElementById('status').textContent=`tunggu ${Math.ceil((1000-(now-lastTap))/1000)}s`; return;} lastTap=now; document.getElementById('tap').style.transform='scale(.9)'; setTimeout(()=>document.getElementById('tap').style.transform='',100); const r=await fetch(`${API}/tap`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}}); const d=await r.json(); if(d.ok){ myCp=d.total_cp; document.getElementById('cp').textContent=myCp.toLocaleString('id-ID'); document.getElementById('status').textContent='+1 CP!'; tg.HapticFeedback?.impactOccurred('light'); } else { document.getElementById('status').textContent=d.error==='cooldown'?'terlalu cepat!':'error'; } }

document.getElementById('btn-board').onclick=()=>{setActive('board');loadBoard();};
document.getElementById('btn-profile').onclick=()=>{setActive('profile');loadProfile();};
document.getElementById('btn-game').onclick=()=>{setActive('game');loadGame();};
function setActive(v){document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active')); if(v!=='game')document.getElementById('btn-'+v).classList.add('active');}
loadBoard();
</script></body></html>
