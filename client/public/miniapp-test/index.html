<!doctype html><html><head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>body{background:#020617;color:#fff;font-family:monospace;padding:20px}pre{background:#0f172a;padding:12px;border-radius:8px}</style>
</head><body>
<h2>TEST INITDATA</h2><div id="s"></div><pre id="o"></pre>
<script>
const tg=window.Telegram?.WebApp; tg?.ready(); tg?.expand();
const d={hasTG:!!tg,initData:!!tg?.initData,len:tg?.initData?.length||0,user:tg?.initDataUnsafe?.user};
document.getElementById('s').innerHTML=d.hasTG?'<span style=color:#22c55e>✓ TG terdeteksi</span>':'<span style=color:#ef4444>✗ KOSONG</span>';
document.getElementById('o').textContent=JSON.stringify(d,null,2);
</script></body></html>
