name: Deploy Website

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Copy build
        run: |
          mkdir deploy
          cp -r dist/public/* deploy
          echo "jksubindo.eu.org" > deploy/CNAME

      - name: Deploy to GitHub Pages repo
        run: |
          cd deploy
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "deploy"
          git branch -M main
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/EruBot/erubot.github.io.git
          git push -f origin main
